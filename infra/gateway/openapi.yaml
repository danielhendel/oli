swagger: "2.0"
info:
  title: oli-api-gateway
  version: "1.0.0"

schemes:
  - https

# For API Gateway / ESPv2, set host to the managed service name.
host: oli-api-0drj1f1cbrv7k.apigateway.oli-staging-fdbba.cloud.goog
basePath: /

produces:
  - application/json
consumes:
  - application/json

x-google-endpoints:
  - name: oli-api-0drj1f1cbrv7k.apigateway.oli-staging-fdbba.cloud.goog
    allowCors: true

# Default backend (all paths unless overridden)
# deadline 90s so long-running Oura pull-now (raw + vendor snapshot writes) can complete
x-google-backend:
  address: https://oli-api-1010034434203.us-central1.run.app
  path_translation: APPEND_PATH_TO_ADDRESS
  deadline: 90.0
  # Required when Cloud Run requires IAM auth (invoker).
  # ESPv2 will mint a Google ID token for this audience when calling the backend.
  jwt_audience: https://oli-api-1010034434203.us-central1.run.app

# Firebase ID token (Authorization: Bearer <JWT>). No API key security scheme.
securityDefinitions:
  firebase:
    authorizationUrl: ""
    flow: implicit
    type: oauth2

    # ESPv2 compatibility:
    # Define at least one scope so that route-level `security: []` (public)
    # is honored correctly. Protected operations use `firebase: []` which requires
    # a valid Firebase JWT but does NOT require any specific OAuth scope.
    scopes:
      openid: "ESPv2 compatibility"

    x-google-issuer: "https://securetoken.google.com/oli-staging-fdbba"
    x-google-jwks_uri: "https://www.googleapis.com/service_accounts/v1/metadata/x509/securetoken@system.gserviceaccount.com"
    x-google-audiences: "oli-staging-fdbba"
    x-google-jwt-locations:
      - header: "Authorization"
        value_prefix: "Bearer "
      - header: "X-Forwarded-Authorization"
        value_prefix: "Bearer "

# Require Firebase by default (fail-closed)
security:
  - firebase: []

paths:
  /health:
    options:
      operationId: healthOptions
      security: []
      responses:
        204:
          description: No Content
    get:
      operationId: healthGet
      security: []
      produces:
        - application/json
      responses:
        200:
          description: OK
          schema:
            $ref: "#/definitions/HealthResponse"

  # NOTE:
  # /healthz is a conventional probe path, and Cloud Run will serve it.
  # HOWEVER: on your API Gateway hostname (*.gateway.dev), Google Frontend intercepts /healthz
  # and returns an HTML 404 before ESPv2/container see the request.
  # Result: https://<gateway>.gateway.dev/healthz => 404 HTML (not your API)
  /healthz:
    options:
      operationId: healthzOptions
      security: []
      responses:
        204:
          description: No Content
    get:
      operationId: healthzGet
      security: []
      produces:
        - application/json
      responses:
        200:
          description: OK
          schema:
            $ref: "#/definitions/HealthResponse"

  # IMPORTANT:
  # This is the *reliable* probe path through API Gateway in this environment.
  # Keep GET security: [] to ensure this endpoint stays PUBLIC (no Firebase required).
  /_healthz:
    options:
      operationId: _healthzOptions
      security: []
      responses:
        204:
          description: No Content
    get:
      operationId: _healthzGet
      security: []   # PUBLIC
      produces:
        - application/json
      responses:
        200:
          description: OK
          schema:
            $ref: "#/definitions/HealthResponse"

  /ready:
    options:
      operationId: readyOptions
      security: []
      responses:
        204:
          description: No Content
    get:
      operationId: readyGet
      security: []
      produces:
        - application/json
      responses:
        200:
          description: OK
          schema:
            $ref: "#/definitions/HealthResponse"

  /live:
    options:
      operationId: liveOptions
      security: []
      responses:
        204:
          description: No Content
    get:
      operationId: liveGet
      security: []
      produces:
        - application/json
      responses:
        200:
          description: OK
          schema:
            $ref: "#/definitions/HealthResponse"

  # Authenticated health check (matches services/api/src/health.ts)
  /health/auth:
    options:
      operationId: healthAuthOptions
      # Browsers preflight should be unauthenticated
      security: []
      responses:
        204:
          description: No Content
    get:
      operationId: healthAuthGet
      # Inherits top-level firebase requirement, but keeping explicit is fine too:
      security:
        - firebase: []
      produces:
        - application/json
      responses:
        200:
          description: OK
          schema:
            $ref: "#/definitions/HealthAuthResponse"

  /ingest:
    options:
      operationId: ingestOptions
      security: []
      responses:
        204:
          description: No Content
    post:
      operationId: ingestPost
      security:
        - firebase: []
      responses:
        200:
          description: OK

  # DELETE workout raw event (path param is percent-encoded in requests, e.g. %3A for ':').
  # Must be declared separately from POST /ingest so API Gateway matches DELETE /ingest/{rawEventId}.
  /ingest/{rawEventId}:
    parameters:
      - name: rawEventId
        in: path
        required: true
        type: string
        description: >
          Firestore rawEvents document id (URL path segment; encode reserved chars per RFC 3986).
          Gateway forwards path to Cloud Run with APPEND_PATH_TO_ADDRESS; ESPv2 decodes the segment for the backend.
    options:
      operationId: ingestByRawEventIdOptions
      security: []
      responses:
        204:
          description: No Content
    delete:
      operationId: ingestRawEventDelete
      security:
        - firebase: []
      produces:
        - application/json
      responses:
        200:
          description: OK — workout removed from Oli
        400:
          description: Bad Request
        401:
          description: Unauthorized
        403:
          description: Forbidden
        404:
          description: Not Found — no raw doc (tombstone may still be written for Apple Health v2 workout ids)
        500:
          description: Server Error

  /export:
    options:
      operationId: exportOptions
      security: []
      responses:
        204:
          description: No Content
    post:
      operationId: exportPost
      security:
        - firebase: []
      responses:
        202:
          description: Accepted

  /account/delete:
    options:
      operationId: accountDeleteOptions
      security: []
      responses:
        204:
          description: No Content
    post:
      operationId: accountDeletePost
      security:
        - firebase: []
      responses:
        202:
          description: Accepted

  /users/me/raw-events:
    options:
      operationId: rawEventsListOptions
      security: []
      responses:
        204:
          description: No Content
    get:
      operationId: rawEventsListGet
      security:
        - firebase: []
      responses:
        200:
          description: OK

  /users/me/raw-event:
    options:
