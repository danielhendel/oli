      security: []
      responses:
        204:
          description: No Content
    get:
      operationId: rawEventByIdGet
      security:
        - firebase: []
      parameters:
        - name: id
          in: query
          required: true
          type: string
      produces:
        - application/json
      responses:
        200:
          description: OK
        400:
          description: Bad Request
        401:
          description: Unauthorized
        404:
          description: Not Found
        500:
          description: Server Error

  /users/me/events:
