    options:
      operationId: exerciseDefinitionsMediaOptions
      security: []
      responses:
        204:
          description: No Content
    post:
      operationId: exerciseDefinitionsMediaUpload
      summary: Upload image or video bytes for a user exercise definition
      description: >
        Accepts application/json with base64 file body. Returns public download URL and slot.
      security:
        - firebase: []
      responses:
        200:
          description: OK
        400:
          description: Bad Request
        401:
          description: Unauthorized
        403:
          description: Forbidden
        404:
