      security: []
      responses:
        204:
          description: No Content
    get:
      operationId: ouraCompleteGet
      security: []
      produces:
        - text/html
      responses:
        200:
          description: Completion bridge HTML

  # Oura ingest — user-authenticated. POST sleep/HRV raw events (Idempotency-Key required).
  /integrations/oura/ingest:
    options:
      operationId: ouraIngestOptions
      security: []
      responses:
        204:
          description: No Content
    post:
      operationId: ouraIngestPost
      security:
        - firebase: []
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          type: string
      responses:
        200:
          description: OK
        400:
          description: Bad Request
        401:
          description: Unauthorized
        500:
          description: Server Error

  # Oura pull-now — user-authenticated. Fetch sleep + HRV from Oura API, write raw events, update lastSyncAt.
  /integrations/oura/pull-now:
    options:
      operationId: ouraPullNowOptions
      security: []
      responses:
        204:
          description: No Content
    post:
      operationId: ouraPullNow
      summary: Oura pull-now (user scoped)
      description: Fetch sleep and daily_readiness (HRV) from Oura API for the authed user; write rawEvents idempotently; update lastSyncAt.
      security:
        - firebase: []
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          type: string
      responses:
        200:
          description: OK (eventsCreated, eventsAlreadyExists)
        400:
          description: Bad Request (missing Idempotency-Key)
        401:
          description: Unauthorized
        409:
          description: Request already in progress
        502:
          description: Oura fetch failed / not connected
        500:
          description: Server Error

  # Oura sleep-day-refresh — user-authenticated. Pull-now core + recompute for one day (Sleep today recovery / pull-to-refresh).
  /integrations/oura/sleep-day-refresh:
    options:
      operationId: ouraSleepDayRefreshOptions
      security: []
      responses:
        204:
          description: No Content
    post:
      operationId: ouraSleepDayRefreshPost
      summary: Oura sleep-day-refresh (user scoped)
      description: Run performOuraPullNowCore then recomputeDerivedTruthForDay for the requested calendar day. Used by Sleep today recovery and pull-to-refresh on the latest day.
      security:
        - firebase: []
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          type: string
      responses:
        200:
          description: OK (pullNowStatus, day)
        400:
          description: Bad Request (missing Idempotency-Key or invalid body)
        401:
          description: Unauthorized
        502:
          description: Oura pull failed / not connected
        500:
          description: Server Error

