  # PUBLIC: Oura OAuth callback (no Firebase; Oura must be able to call this)
  /integrations/oura/callback:
    options:
      operationId: ouraCallbackOptions
      security: []
      responses:
        204:
          description: No Content
    get:
      operationId: ouraCallbackGet
      security: []
      responses:
