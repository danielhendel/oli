steps:
  - name: gcr.io/cloud-builders/docker
    args:
      [
        "build",
        "-f",
        "services/api/Dockerfile",
        "-t",
        "us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/oli-api:${_SHORT_SHA}",
        "."
      ]

images:
  - "us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/oli-api:${_SHORT_SHA}"

substitutions:
  _SHORT_SHA: "local"